<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>经典电影推荐</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
            background: linear-gradient(145deg, #f5f0e7 0%, #e8dfd3 100%);
            color: #1e1b1a;
            line-height: 1.5;
            scroll-behavior: smooth;
        }

        /* 装饰性背景纹理 */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background-image: radial-gradient(rgba(0,0,0,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            z-index: 0;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            position: relative;
            z-index: 2;
        }

        /* 页眉区域 */
        .hero {
            text-align: center;
            margin-bottom: 3.5rem;
            padding: 1rem 0 1rem;
        }

        .hero h1 {
            font-size: 3.2rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #c73b1e, #9b2e16, #3b2a23);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 0.75rem;
            font-weight: 700;
            text-shadow: 2px 2px 12px rgba(0,0,0,0.05);
        }

        .hero-tagline {
            font-size: 1.2rem;
            color: #5a4a3c;
            border-bottom: 2px solid #d4b48c;
            display: inline-block;
            padding-bottom: 0.5rem;
            font-weight: 450;
        }

        /* 筛选栏 + 动态氛围 */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 3rem;
        }

        .filter-btn {
            background: rgba(255, 248, 235, 0.8);
            backdrop-filter: blur(4px);
            border: 1px solid #d6c4b0;
            padding: 0.6rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #3a2c24;
            font-family: inherit;
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .filter-btn.active {
            background: #9b2e16;
            border-color: #9b2e16;
            color: white;
            box-shadow: 0 6px 12px rgba(155, 46, 22, 0.25);
        }

        .filter-btn:hover:not(.active) {
            background: #e6d9cb;
            border-color: #b69773;
            transform: translateY(-2px);
        }

        /* 电影卡片网格 */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        /* 卡片样式 - 优雅现代 */
        .movie-card {
            background: #ffffffea;
            backdrop-filter: blur(2px);
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.2), 0 1px 2px rgba(0,0,0,0.05);
            transition: transform 0.3s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255,245,235,0.7);
        }

        .movie-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 40px -16px rgba(0, 0, 0, 0.3);
        }

        /* 电影海报占位 / 渐变背景 */
        .poster {
            height: 260px;
            background-size: cover;
            background-position: center 20%;
            background-repeat: no-repeat;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            padding: 1rem;
        }

        /* 评分徽章 */
        .rating-badge {
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffdd99;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            letter-spacing: 0.5px;
            border: 0.5px solid rgba(255,215,150,0.5);
        }

        .rating-badge::before {
            content: "⭐";
            font-size: 0.8rem;
        }

        /* 电影信息区 */
        .movie-info {
            padding: 1.5rem 1.5rem 1.8rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .movie-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 0.3rem;
            color: #2c1f18;
        }

        .movie-year {
            font-size: 0.85rem;
            color: #8b6f50;
            font-weight: 500;
            margin-bottom: 0.75rem;
            display: inline-block;
            border-left: 3px solid #c06c3e;
            padding-left: 8px;
        }

        .movie-genre {
            display: inline-block;
            background: #f2e5d8;
            border-radius: 20px;
            padding: 0.2rem 0.8rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: #9b4a2a;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            align-self: flex-start;
        }

        .movie-desc {
            color: #3f332b;
            font-size: 0.9rem;
            margin-bottom: 1.2rem;
            line-height: 1.45;
            flex: 1;
        }

        .director {
            font-size: 0.75rem;
            color: #9c7c60;
            border-top: 1px solid #f0e2d4;
            padding-top: 0.8rem;
            margin-top: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .director span:first-child {
            font-weight: 500;
        }

        .btn-trailer {
            background: none;
            border: 1.5px solid #d9b48b;
            border-radius: 40px;
            padding: 0.3rem 0.9rem;
            font-size: 0.7rem;
            font-weight: 600;
            color: #aa5c38;
            cursor: pointer;
            transition: 0.2s;
            font-family: inherit;
        }

        .btn-trailer:hover {
            background: #aa5c38;
            color: white;
            border-color: #aa5c38;
        }

        /* 空状态 */
        .no-results {
            text-align: center;
            padding: 3rem;
            font-size: 1.2rem;
            background: rgba(255,245,235,0.6);
            border-radius: 48px;
            color: #795d42;
            grid-column: 1 / -1;
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid #ddd0bf;
            font-size: 0.8rem;
            color: #7f6650;
        }

        /* 响应式微调 */
        @media (max-width: 680px) {
            .container {
                padding: 1.2rem 1rem 2.5rem;
            }
            .hero h1 {
                font-size: 2.3rem;
            }
            .movies-grid {
                gap: 1.2rem;
            }
            .movie-title {
                font-size: 1.4rem;
            }
        }

        /* 简易动画 */
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .movie-card {
            animation: fadeUp 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🎬 Movie Suggestion</h1>
        <div class="hero-tagline">光影之间 · 永恒经典与当代杰作</div>
    </div>

    <!-- 筛选按钮组：根据类型筛选 -->
    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-genre="all">全部电影</button>
        <button class="filter-btn" data-genre="剧情">🎭 剧情</button>
        <button class="filter-btn" data-genre="科幻">🚀 科幻</button>
        <button class="filter-btn" data-genre="悬疑">🔍 悬疑</button>
        <button class="filter-btn" data-genre="动画">✨ 动画</button>
    </div>

    <!-- 电影卡片网格 -->
    <div class="movies-grid" id="moviesGrid"></div>

    <div class="footer">
        🌟 每一部电影都是一次人生冒险 | 数据仅供欣赏 · 致敬电影艺术
    </div>
</div>

<script>
    // ---------- 电影数据库 ----------
    const moviesData = [
        {
            id: 1,
            title: "肖申克的救赎",
            year: 1994,
            genre: "剧情",
            director: "弗兰克·德拉邦特",
            rating: "9.7",
            desc: "一场跨越十九年的越狱，一个关于希望与自由的永恒寓言。银行家安迪含冤入狱，却在肖申克监狱中用自己的智慧与坚韧为狱友带来救赎的光芒。",
            posterBg: "linear-gradient(135deg, #1a2a3a, #0e1a24), url('https://placehold.co/600x400/2c3e4e/e0b890?text=The+Shawshank+Redemption')", // 备用渐变+图片占位，实际使用漂亮背景图
            bgImage: "https://image.tmdb.org/t/p/w1280/9cqN3N6Nl9pZq7jNpQ8M4x3o2g1.jpg", // 高质电影氛围图，但为了脱机演示采用可靠在线资源，使用高清占位符风格
            // 为了保证任何网络下都有视觉效果，我们采用CSS背景叠加优雅颜色
            bgStyle: "linear-gradient(125deg, #1e2f3c, #0f1a21), url('https://picsum.photos/id/104/400/260?grayscale')"
        },
        {
            id: 2,
            title: "盗梦空间",
            year: 2010,
            genre: "科幻",
            director: "克里斯托弗·诺兰",
            rating: "9.3",
            desc: "梦境与现实层层嵌套，柯布带领团队潜入他人梦境实施‘奠基’。极致的视觉想象与情感内核，旋转的陀螺永不停歇。",
            posterBg: "linear-gradient(135deg, #2c2e3f, #12141c), url('https://picsum.photos/id/26/400/260')"
        },
        {
            id: 3,
            title: "控方证人",
            year: 1957,
            genre: "悬疑",
            director: "比利·怀尔德",
            rating: "9.5",
            desc: "经典法庭悬疑反转鼻祖。伦敦著名律师为谋杀案嫌疑人辩护，然而证人的出现让局势扑朔迷离，结局五重反转令人拍案叫绝。",
            posterBg: "linear-gradient(145deg, #3e2c2a, #211715), url('https://picsum.photos/id/119/400/260')"
        },
        {
            id: 4,
            title: "千与千寻",
            year: 2001,
            genre: "动画",
            director: "宫崎骏",
            rating: "9.4",
            desc: "少女千寻误入神灵异世界，在油屋中不断成长，寻回名字与勇气的旅程。宫崎骏笔下的想象力与温情治愈一代人。",
            posterBg: "linear-gradient(125deg, #4e6e5e, #2a3e33), url('https://picsum.photos/id/96/400/260')"
        },
        {
            id: 5,
            title: "星际穿越",
            year: 2014,
            genre: "科幻",
            director: "克里斯托弗·诺兰",
            rating: "9.4",
            desc: "为了人类存续，前NASA飞行员库珀穿越虫洞寻找宜居星球。爱与时间的相对论，超越维度的动人联结。",
            posterBg: "linear-gradient(115deg, #0e1f2c, #010a12), url('https://picsum.photos/id/42/400/260')"
        },
        {
            id: 6,
            title: "寄生虫",
            year: 2019,
            genre: "剧情",
            director: "奉俊昊",
            rating: "8.6",
            desc: "两个阶层意外交织，穷人家庭渗透进富人豪宅，却引发了一连串失控事件。黑色幽默与惊悚完美融合，奥斯卡最佳影片。",
            posterBg: "linear-gradient(130deg, #3b3b3b, #1c1c1c), url('https://picsum.photos/id/20/400/260')"
        },
        {
            id: 7,
            title: "楚门的世界",
            year: 1998,
            genre: "剧情",
            director: "彼得·威尔",
            rating: "9.3",
            desc: "楚门从出生就活在全世界直播的巨型摄影棚里，直到他开始怀疑一切。反抗虚假，追寻真实的经典寓言。",
            posterBg: "linear-gradient(120deg, #4c798a, #25515f), url('https://picsum.photos/id/22/400/260')"
        },
        {
            id: 8,
            title: "消失的爱人",
            year: 2014,
            genre: "悬疑",
            director: "大卫·芬奇",
            rating: "8.9",
            desc: "结婚五周年纪念日，妻子离奇失踪，所有证据指向丈夫。婚姻与谎言，媒体狂欢下惊悚的心理博弈。",
            posterBg: "linear-gradient(145deg, #442b27, #241613), url('https://picsum.photos/id/107/400/260')"
        },
        {
            id: 9,
            title: "寻梦环游记",
            year: 2017,
            genre: "动画",
            director: "李·昂克里奇",
            rating: "9.1",
            desc: "小男孩米格误入亡灵世界，与落魄乐手一起探寻家族秘密。关于记忆与亲情，死亡不是终点，遗忘才是。",
            posterBg: "linear-gradient(125deg, #e09e3a, #b45f2b), url('https://picsum.photos/id/106/400/260')"
        }
    ];

    // ---------- 动态渲染 ----------
    const moviesGrid = document.getElementById('moviesGrid');
    const filterBtns = document.querySelectorAll('.filter-btn');
    let currentGenre = 'all';

    // 辅助函数：给每张卡片背景图更丰富 (使用高质量电影氛围占位图 + 叠加渐变，为了视觉美观，我们采用从 picsum 获取特定图像并配合色值)
    // 但为了致敬电影主题，每个电影都会有不同的视觉色调, 完全用CSS背景展示风格。
    function getCardPosterStyle(movie) {
        // 根据电影标题生成差异化的图片占位 —— 可用高清电影主题图？但为了脱机演示稳健，采用优雅色彩+纹理+电影名字水印感
        // 使用渐变 + 低多边形模拟海报风格，让每个卡片拥有独特颜色
        const colorMap = {
            "肖申克的救赎": "linear-gradient(125deg, #2b4a5c, #0d2c3b)",
            "盗梦空间": "radial-gradient(circle at 20% 30%, #334454, #10161f)",
            "控方证人": "linear-gradient(135deg, #542e2b, #2c1917)",
            "千与千寻": "linear-gradient(145deg, #3d6b5b, #1d4538)",
            "星际穿越": "linear-gradient(112deg, #15232e, #030d13)",
            "寄生虫": "linear-gradient(127deg, #3c5d4c, #1f3d2e)",
            "楚门的世界": "linear-gradient(118deg, #4f91aa, #215d74)",
            "消失的爱人": "linear-gradient(130deg, #553b36, #2f1e1b)",
            "寻梦环游记": "linear-gradient(125deg, #f3b34c, #cc7733)"
        };
        let gradient = colorMap[movie.title] || "linear-gradient(135deg, #6f5b4a, #3e2d23)";
        // 增加微妙的胶片噪点样式
        return `${gradient}, repeating-linear-gradient(45deg, rgba(255,255,200,0.02) 0px, rgba(255,255,200,0.02) 2px, transparent 2px, transparent 8px)`;
    }

    // 为每部电影生成独特的背景图（展示影片氛围），并叠加电影名称水印效果（仅装饰）
    function renderMovies(filterGenre) {
        const filteredMovies = filterGenre === 'all' 
            ? moviesData 
            : moviesData.filter(movie => movie.genre === filterGenre);
        
        if (filteredMovies.length === 0) {
            moviesGrid.innerHTML = `<div class="no-results">✨ 没有找到「${filterGenre}」类型的电影，试试其他类别吧 🎞️</div>`;
            return;
        }
        
        let cardsHtml = '';
        for (let movie of filteredMovies) {
            const posterStyle = getCardPosterStyle(movie);
            // 额外在背景上显示虚化文字作为氛围，不做额外请求，只用纯css展现电影感
            cardsHtml += `
                <div class="movie-card" data-id="${movie.id}">
                    <div class="poster" style="background: ${posterStyle}; background-size: cover; background-blend-mode: overlay; position: relative;">
                        <div class="rating-badge">${movie.rating}</div>
                        <div style="position: absolute; bottom: 12px; right: 16px; font-size: 32px; opacity: 0.1; font-weight: bold; pointer-events: none;">🎬</div>
                    </div>
                    <div class="movie-info">
                        <div class="movie-title">${escapeHtml(movie.title)}</div>
                        <div class="movie-year">${movie.year} · 片长约2h</div>
                        <div class="movie-genre">${movie.genre}</div>
                        <div class="movie-desc">${escapeHtml(movie.desc)}</div>
                        <div class="director">
                            <span>🎥 导演：${escapeHtml(movie.director)}</span>
                            <button class="btn-trailer" data-movie="${escapeHtml(movie.title)}">▶ 预告片</button>
                        </div>
                    </div>
                </div>
            `;
        }
        moviesGrid.innerHTML = cardsHtml;
        
        // 绑定所有预告片按钮事件（模拟弹窗提示）
        const trailerBtns = document.querySelectorAll('.btn-trailer');
        trailerBtns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const movieName = btn.getAttribute('data-movie');
                // 优雅告知用户预告片演示功能（由于无真实链接，用alert模拟但显示文案更友好）
                alert(`🎞️ “${movieName}” 官方预告片正在影院热映/经典重温中！\n（演示版示意，完整版可嵌入YouTube链接）\n推荐去各大平台搜索“${movieName} 预告”观看~`);
            });
        });
    }

    // 简单防XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // 筛选交互
    function setActiveFilter(genre) {
        filterBtns.forEach(btn => {
            if (btn.getAttribute('data-genre') === genre) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        });
    }

    filterBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            const genre = btn.getAttribute('data-genre');
            currentGenre = genre;
            setActiveFilter(genre);
            renderMovies(currentGenre);
        });
    });

    // 初始加载全部电影
    renderMovies('all');
    
    // 添加额外小细节：控制台打印电影列表信息，展示幕后
    console.log('🎬 银幕幻旅已载入 | 共收录 %d 部高分电影', moviesData.length);
</script>
</body>
</html>
